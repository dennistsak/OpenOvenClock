<svg width="100%" height="180" viewBox="0 0 400 180" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Green LED glow -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect x="0" y="0" width="100%" height="180" rx="16" fill="#0f172a"/>

  <!-- Subtle PCB traces -->
  <g stroke="#1e293b" stroke-width="2" opacity="0.6">
    <line x1="20" y1="20" x2="120" y2="20"/>
    <line x1="20" y1="50" x2="80" y2="50"/>
    <line x1="280" y1="105" x2="380" y2="105"/>
    <circle cx="120" cy="20" r="3" fill="#1e293b"/>
    <circle cx="80" cy="50" r="3" fill="#1e293b"/>
    <circle cx="280" cy="105" r="3" fill="#1e293b"/>
  </g>

  <!-- Display frame -->
  <rect x="90" y="30" width="220" height="60" rx="8" fill="#020617" stroke="#334155" stroke-width="2"/>

  <!-- 7-segment style digits -->
  <text x="165" y="72" text-anchor="middle"
        font-family="monospace"
        font-size="36"
        font-style="italic"
        fill="#00e676"
        letter-spacing="6"
        filter="url(#glow)">
    12
  </text>
  <text x="200" y="70" text-anchor="middle"
        visibility="visible"
        font-family="monospace"
        font-size="36"
        font-style="italic"
        fill="#00e676"
        letter-spacing="6"
        filter="url(#glow)">
        <animate
          attributeName="visibility"
          begin="0s"
          dur="2s"
          from="hidden"
          to="visible"
          repeatCount="indefinite"
        />
    :
  </text>
  <text x="235" y="72" text-anchor="middle"
        font-family="monospace"
        font-size="36"
        font-style="italic"
        fill="#00e676"
        letter-spacing="6"
        filter="url(#glow)">
    34
  </text>

  <!-- Left buttons -->
  <g>
    <circle cx="120" cy="140" r="12" fill="#1e293b" stroke="#475569" stroke-width="2"/>
  </g>
  <!-- Rotary encoder (knob) -->
  <g>
    <circle cx="280" cy="140" r="18" fill="#1e293b" stroke="#475569" stroke-width="2"/>
    <line x1="280" y1="140" x2="280" y2="125" stroke="#94a3b8" stroke-width="3" stroke-linecap="round"/>
  </g>

  <!-- Project name
  <text x="200" y="160" text-anchor="middle"
        font-family="Arial, sans-serif"
        font-size="18"
        fill="#e2e8f0"
        letter-spacing="1">
    OpenOvenClock
  </text> -->
</svg>